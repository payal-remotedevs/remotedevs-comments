services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  RemoteDevs\RdComments\:
    resource: '../Classes/*'
    exclude: '../Classes/Domain/Model/*'

  # Explicitly configure the controller
  RemoteDevs\RdComments\Controller\BackendCommentController:
    public: true
    arguments:
      $commentRepository: '@RemoteDevs\RdComments\Domain\Repository\CommentRepository'
      $persistenceManager: '@TYPO3\CMS\Extbase\Persistence\Generic\PersistenceManager'
      $newsRepository: '@GeorgRinger\News\Domain\Repository\NewsRepository'

  # Repository configuration
  RemoteDevs\RdComments\Domain\Repository\CommentRepository:
    public: true